<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>EduPortal — Aluno</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style-aluno.css">
</head>
<body>

<div class="phone-shell">
  <div class="side-btn-r"></div>
  <div class="side-btn-l" style="top:148px;height:36px"></div>
  <div class="side-btn-l" style="top:198px;height:60px"></div>
  <div class="side-btn-l" style="top:272px;height:60px"></div>
  <div class="notch"><div class="notch-mic"></div><div class="notch-cam"></div></div>

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><rect x="1" y="15" width="4" height="6" rx="1"/><rect x="7" y="11" width="4" height="10" rx="1"/><rect x="13" y="7" width="4" height="14" rx="1"/><rect x="19" y="3" width="4" height="18" rx="1" opacity=".3"/></svg>
      <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="12" cy="20" r="1" fill="rgba(255,255,255,.85)"/></svg>
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2" stroke="rgba(255,255,255,.85)" stroke-width="1.5" fill="none"/><line x1="22" y1="11" x2="22" y2="14" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"/><rect x="4" y="9" width="12" height="7" rx="1" fill="rgba(255,255,255,.85)"/></svg>
    </div>
  </div>

  <div class="screen">
    <div class="hero">
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        </div>
        <span class="logo-name">EduPortal</span>
        <a href="login-mobile.html" class="back-btn">
          <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Sair
        </a>
      </div>
      <div class="hero-badge"><div class="hero-badge-dot"></div><span>Área do Aluno</span></div>
      <div class="hero-title">Olá,<br/><em id="studentName">Ana Beatriz</em></div>
      <div class="hero-sub">2º Ano B · Turno Manhã · 2024</div>
    </div>

    <div class="summary-bar">
      <div class="summary-card">
        <div class="summary-item neutral">
          <div class="val" id="summaryAvg">—</div>
          <div class="lbl">Média Geral</div>
        </div>
        <div class="sep"></div>
        <div class="summary-item ok">
          <div class="val" id="summaryApproved">—</div>
          <div class="lbl">Aprovado em</div>
        </div>
        <div class="sep"></div>
        <div class="summary-item fail">
          <div class="val" id="summaryFailed">—</div>
          <div class="lbl">Recuperação</div>
        </div>
      </div>
    </div>

    <div class="content-scroll">
      <div class="section-title">Notas por Matéria</div>
      <div id="subjectList"></div>
    </div>

    <div class="home-indicator"><div class="home-bar"></div></div>
  </div>
</div>

<script>
  // ---- DATA ---- (shared via localStorage with teacher portal)
  const PASS_GRADE = 7;

  const defaultSubjects = [
    { id: 1, name: 'Matemática',       teacher: 'Prof. Carlos Mendes',    grades: [8.5, 7.0, 9.0, 8.0] },
    { id: 2, name: 'Português',        teacher: 'Profa. Lúcia Ferreira',  grades: [6.0, 5.5, 7.5, 6.5] },
    { id: 3, name: 'História',         teacher: 'Prof. Roberto Alves',    grades: [9.0, 8.5, 9.5, 9.0] },
    { id: 4, name: 'Biologia',         teacher: 'Profa. Sandra Lima',     grades: [5.0, 4.5, 6.0, 5.5] },
    { id: 5, name: 'Física',           teacher: 'Prof. André Costa',      grades: [7.5, 8.0, 7.0, 8.5] },
    { id: 6, name: 'Química',          teacher: 'Profa. Márcia Souza',    grades: [6.5, 7.0, 5.5, 6.0] },
  ];

  function getSubjects() {
    try {
      const stored = localStorage.getItem('eduportal_subjects');
      return stored ? JSON.parse(stored) : defaultSubjects;
    } catch(e) { return defaultSubjects; }
  }

  function avg(arr) {
    const valid = arr.filter(n => n !== null && n !== undefined && n !== '');
    if (!valid.length) return null;
    return valid.reduce((a,b) => a + parseFloat(b), 0) / valid.length;
  }

  function renderSubjects() {
    const subjects = getSubjects();
    const list = document.getElementById('subjectList');
    list.innerHTML = '';

    let totalAvg = 0, approvedCount = 0, failedCount = 0, count = 0;

    subjects.forEach((sub, i) => {
      const average = avg(sub.grades);
      const hasFull = sub.grades.every(g => g !== null && g !== '');
      let status = 'pending', statusLabel = 'Em andamento';
      if (hasFull && average !== null) {
        if (average >= PASS_GRADE) { status = 'approved'; statusLabel = 'Aprovado'; approvedCount++; }
        else { status = 'failed'; statusLabel = 'Recuperação'; failedCount++; }
        totalAvg += average; count++;
      }

      const pct = average !== null ? Math.min(100, (average / 10) * 100) : 0;
      const barClass = average !== null && average >= PASS_GRADE ? 'ok' : 'warn';

      const gradeLabels = ['1ª Bimestre', '2ª Bimestre', '3ª Bimestre', '4ª Bimestre'];
      const gradesHTML = sub.grades.map((g, gi) => `
        <div class="grade-box">
          <div class="g-val">${g !== null && g !== '' ? parseFloat(g).toFixed(1) : '—'}</div>
          <div class="g-lbl">${gradeLabels[gi]}</div>
        </div>
      `).join('');

      const card = document.createElement('div');
      card.className = 'subject-card';
      card.style.animationDelay = (i * 0.06) + 's';
      card.innerHTML = `
        <div class="subject-top">
          <div>
            <div class="subject-name">${sub.name}</div>
            <div class="subject-teacher">${sub.teacher}</div>
          </div>
          <div class="status-pill ${status}">${statusLabel}</div>
        </div>
        <div class="grades-row">
          ${gradesHTML}
          <div class="grade-box highlight">
            <div class="g-val">${average !== null ? average.toFixed(1) : '—'}</div>
            <div class="g-lbl">Média</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar ${barClass}" style="width:${pct}%"></div>
        </div>
      `;
      list.appendChild(card);
    });

    // Update summary
    document.getElementById('summaryAvg').textContent = count ? (totalAvg / count).toFixed(1) : '—';
    document.getElementById('summaryApproved').textContent = approvedCount + ' mat.';
    document.getElementById('summaryFailed').textContent = failedCount + ' mat.';
  }

  // Clock
  function updateClock() {
    const now = new Date();
    document.querySelector('.status-time').textContent =
      now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  }
  updateClock(); setInterval(updateClock, 10000);

  renderSubjects();
</script>
</body>
</html>
