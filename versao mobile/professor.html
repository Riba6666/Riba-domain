<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>EduPortal — Professor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
 <link rel="stylesheet" href="style-professor.css">
</head>
<body>

<div class="phone-shell">
  <div class="side-btn-r"></div>
  <div class="side-btn-l" style="top:148px;height:36px"></div>
  <div class="side-btn-l" style="top:198px;height:60px"></div>
  <div class="side-btn-l" style="top:272px;height:60px"></div>
  <div class="notch"><div class="notch-mic"></div><div class="notch-cam"></div></div>

  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><rect x="1" y="15" width="4" height="6" rx="1"/><rect x="7" y="11" width="4" height="10" rx="1"/><rect x="13" y="7" width="4" height="14" rx="1"/><rect x="19" y="3" width="4" height="18" rx="1" opacity=".3"/></svg>
      <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="12" cy="20" r="1" fill="rgba(255,255,255,.85)"/></svg>
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2" stroke="rgba(255,255,255,.85)" stroke-width="1.5" fill="none"/><line x1="22" y1="11" x2="22" y2="14" stroke="rgba(255,255,255,.85)" stroke-width="2" stroke-linecap="round"/><rect x="4" y="9" width="12" height="7" rx="1" fill="rgba(255,255,255,.85)"/></svg>
    </div>
  </div>

  <div class="screen">
    <div class="hero">
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        </div>
        <span class="logo-name">EduPortal</span>
        <a href="login-mobile.html" class="back-btn">
          <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Sair
        </a>
      </div>
      <div class="hero-badge"><div class="hero-badge-dot"></div><span>Área Docente</span></div>
      <div class="hero-title">Olá,<br/><em id="teacherName">Prof. Carlos</em></div>
      <div class="hero-sub">Turma 1º Perídio · 2026 · 6 Matérias</div>
    </div>

    <div class="stats-bar">
      <div class="stats-card">
        <div class="stat-item">
          <div class="val" id="statStudents">—</div>
          <div class="lbl">Alunos</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <div class="val" id="statClassAvg">—</div>
          <div class="lbl">Média Turma</div>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <div class="val" id="statApproval">—</div>
          <div class="lbl">Aprovação</div>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <button class="view-tab active" onclick="switchView('grades',this)">Notas por Matéria</button>
      <button class="view-tab" onclick="switchView('overview',this)">Visão da Turma</button>
    </div>

    <div class="content-scroll" id="mainScroll">
      <div id="gradesView"></div>
      <div id="overviewView" style="display:none"></div>
    </div>

    <div class="home-indicator"><div class="home-bar"></div></div>
  </div>
  <div class="toast" id="toast">✓ Notas salvas com sucesso!</div>
</div>

<script>
  const PASS_GRADE = 7;

  const defaultSubjects = [
    { id:1, name:'Ideação',  teacher:'Prof. Carlos Gustavo',   grades:[8.5,7.0,9.0,8.0] },
    { id:2, name:'Português',   teacher:'Profa. Lúcia Ferreira', grades:[6.0,5.5,7.5,6.5] },
    { id:3, name:'História',    teacher:'Prof. Roberto Alves',   grades:[9.0,8.5,9.5,9.0] },
    { id:4, name:'Biologia',    teacher:'Profa. Sandra Lima',    grades:[5.0,4.5,6.0,5.5] },
    { id:5, name:'Física',      teacher:'Prof. André Costa',     grades:[7.5,8.0,7.0,8.5] },
    { id:6, name:'Química',     teacher:'Profa. Márcia Souza',   grades:[6.5,7.0,5.5,6.0] },
  ];

  // Simulated students
  const students = [
    { name:'Athon Fernandes',  color:'#0f3460' },
    { name:'Atabisio Henry',   color:'#7c3aed' },
    { name:'Giovanni Figueiredo',  color:'#b45309' },
    { name:'Rafael Moura',  color:'#0e7490' },
    { name:'Eduardo Maciel',  color:'#be185d' },
  ];

  function getSubjects() {
    try { const s=localStorage.getItem('eduportal_subjects'); return s?JSON.parse(s):defaultSubjects; }
    catch(e){ return defaultSubjects; }
  }
  function saveSubjects(subjects) {
    localStorage.setItem('eduportal_subjects', JSON.stringify(subjects));
  }

  function avg(arr) {
    const valid = arr.filter(n => n!==null && n!==undefined && n!=='');
    if (!valid.length) return null;
    return valid.reduce((a,b)=>a+parseFloat(b),0)/valid.length;
  }

  function initStats() {
    const subjects = getSubjects();
    let total=0, count=0, approved=0;
    subjects.forEach(s => {
      const a = avg(s.grades);
      if (a!==null){ total+=a; count++; if(a>=PASS_GRADE) approved++; }
    });
    const classAvg = count ? total/count : null;
    document.getElementById('statStudents').textContent = students.length;
    document.getElementById('statClassAvg').textContent = classAvg!==null ? classAvg.toFixed(1) : '—';
    const pct = count ? Math.round((approved/count)*100) : 0;
    document.getElementById('statApproval').textContent = pct + '%';
  }

  function renderGrades() {
    const subjects = getSubjects();
    const view = document.getElementById('gradesView');
    view.innerHTML = '<div class="section-title">Editar Notas por Matéria</div>';
    const labels = ['1º Bimestre','2º Bimestre','3º Bimestre','4º Bimestre'];

    subjects.forEach((sub, i) => {
      const average = avg(sub.grades);
      const pillClass = average===null ? 'neutral' : (average>=PASS_GRADE ? 'ok' : 'warn');
      const pillText = average===null ? '—' : average.toFixed(1);

      const card = document.createElement('div');
      card.className = 'subject-card';
      card.style.animationDelay = (i*0.06)+'s';

      const gradesInputs = sub.grades.map((g,gi) => `
        <div class="grade-field">
          <label>${labels[gi]}</label>
          <input type="number" min="0" max="10" step="0.1"
            value="${g!==null&&g!=='' ? parseFloat(g).toFixed(1) : ''}"
            placeholder="0.0" data-subject="${sub.id}" data-idx="${gi}"/>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(this)">
          <div>
            <div class="subject-name">${sub.name}</div>
            <div class="subject-teacher">${sub.teacher}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="avg-pill ${pillClass}">${pillText}</div>
            <svg class="chevron" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="card-body">
          <div class="grades-grid">${gradesInputs}</div>
          <button class="save-btn" onclick="saveGrades(${sub.id},this)">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Salvar Notas
          </button>
        </div>
      `;
      view.appendChild(card);
    });
  }

  function renderOverview() {
    const subjects = getSubjects();
    const view = document.getElementById('overviewView');

    // Class avg
    let total=0,count=0,approvedSubs=0;
    subjects.forEach(s=>{const a=avg(s.grades);if(a!==null){total+=a;count++;if(a>=PASS_GRADE)approvedSubs++;}});
    const classAvg = count?total/count:null;
    const pct = classAvg!==null?Math.min(100,(classAvg/10)*100):0;
    const circumference = 2*Math.PI*23;
    const dashOffset = circumference - (circumference*(pct/100));

    view.innerHTML = `
      <div class="section-title">Visão Geral da Turma</div>
      <div class="class-avg-banner">
        <div>
          <div class="label">Média Geral da Turma</div>
          <div class="big">${classAvg!==null?classAvg.toFixed(2):'—'}</div>
          <div class="sub">${approvedSubs} de ${subjects.length} matérias acima da média</div>
        </div>
        <div class="avg-ring">
          <svg viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="23" fill="none" stroke="rgba(232,184,109,0.15)" stroke-width="4"/>
            <circle cx="28" cy="28" r="23" fill="none" stroke="#e8b86d" stroke-width="4"
              stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
              stroke-linecap="round"/>
          </svg>
          <div class="avg-ring-val">${classAvg!==null?Math.round(pct)+'%':'—'}</div>
        </div>
      </div>
      <div class="section-title">Alunos da Turma</div>
    `;

    // Per student: assign random-ish grades derived from the subject data
    students.forEach((stu,i)=>{
      const initials = stu.name.split(' ').map(n=>n[0]).join('').slice(0,2);
      // Simple deterministic variation per student
      const stuAvgs = subjects.map(sub => {
        const a = avg(sub.grades);
        if (a===null) return null;
        const delta = ((i-2)*0.3); // vary ±0.6 per student
        return Math.max(0,Math.min(10,a+delta));
      });
      const stuGlobal = stuAvgs.filter(a=>a!==null);
      const stuAvg = stuGlobal.length ? stuGlobal.reduce((a,b)=>a+b,0)/stuGlobal.length : null;
      const pillClass = stuAvg===null?'neutral':(stuAvg>=PASS_GRADE?'ok':'warn');

      const row = document.createElement('div');
      row.className = 'student-row';
      row.style.animationDelay=(i*0.07)+'s';
      row.innerHTML = `
        <div class="student-avatar" style="background:${stu.color}">${initials}</div>
        <div class="student-info">
          <div class="student-name">${stu.name}</div>
          <div class="student-meta">${stuAvg!==null?(stuAvg>=PASS_GRADE?'✓ Aprovado(a)':'⚠ Recuperação'):'Parcial'}</div>
        </div>
        <div class="student-avg ${pillClass}">${stuAvg!==null?stuAvg.toFixed(1):'—'}</div>
      `;
      view.appendChild(row);
    });
  }

  function toggleCard(header) {
    header.classList.toggle('open');
    const body = header.nextElementSibling;
    body.classList.toggle('open');
  }

  function saveGrades(subjectId, btn) {
    const subjects = getSubjects();
    const sub = subjects.find(s=>s.id===subjectId);
    if (!sub) return;

    const inputs = document.querySelectorAll(`[data-subject="${subjectId}"]`);
    inputs.forEach(inp => {
      const idx = parseInt(inp.dataset.idx);
      const val = inp.value.trim();
      sub.grades[idx] = val==='' ? null : Math.max(0,Math.min(10,parseFloat(val)));
    });

    saveSubjects(subjects);

    // Update avg pill
    const card = btn.closest('.subject-card');
    const a = avg(sub.grades);
    const pill = card.querySelector('.avg-pill');
    pill.className = 'avg-pill ' + (a===null?'neutral':(a>=PASS_GRADE?'ok':'warn'));
    pill.textContent = a!==null?a.toFixed(1):'—';

    btn.classList.add('saved');
    btn.textContent = '✓ Salvo!';
    setTimeout(()=>{ btn.classList.remove('saved'); btn.innerHTML='<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke="currentColor" fill="none"><polyline points="20 6 9 17 4 12"/></svg> Salvar Notas'; },2000);

    initStats();
    renderOverview();

    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2200);
  }

  function switchView(view, btn) {
    document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('gradesView').style.display = view==='grades'?'block':'none';
    document.getElementById('overviewView').style.display = view==='overview'?'block':'none';
    document.getElementById('mainScroll').scrollTop = 0;
  }

  function updateClock() {
    const now = new Date();
    document.querySelector('.status-time').textContent =
      now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  }
  updateClock(); setInterval(updateClock,10000);

  initStats();
  renderGrades();
  renderOverview();
</script>
</body>
</html>
